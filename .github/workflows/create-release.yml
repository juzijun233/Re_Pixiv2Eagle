name: Create Release (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v), e.g. 1.2.3"
        required: true
        type: string
      release_notes:
        description: "Paste current version changelog section"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: true
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Validate version input format
        run: |
          VERSION='${{ inputs.version }}'
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version input: '$VERSION'"
            echo "Expected semantic version format: X.Y.Z or X.Y.Z-<prerelease>"
            exit 1
          fi

      - name: Build release artifacts
        run: npm run release

      - name: Validate artifact exists
        run: |
          test -f "Releases/${{ inputs.version }}/RePixiv2Eagle.js" || {
            echo "Artifact not found: Releases/${{ inputs.version }}/RePixiv2Eagle.js"
            exit 1
          }

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: ${{ inputs.release_notes }}
          prerelease: ${{ inputs.prerelease }}
          draft: false
          files: |
            Releases/${{ inputs.version }}/RePixiv2Eagle.js
